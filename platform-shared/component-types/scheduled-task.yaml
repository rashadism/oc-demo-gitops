apiVersion: openchoreo.dev/v1alpha1
kind: ClusterComponentType
metadata:
  annotations:
    openchoreo.dev/description: A component that runs to completion on a schedule
  name: scheduled-task
spec:
  allowedWorkflows:
    - kind: ClusterWorkflow
      name: docker-gitops-release
    - kind: ClusterWorkflow
      name: google-cloud-buildpacks-gitops-release
  environmentConfigs:
    openAPIV3Schema:
      $defs:
        ResourceQuantity:
          default: {}
          properties:
            cpu:
              default: 100m
              type: string
            memory:
              default: 128Mi
              type: string
          type: object
        ResourceRequirements:
          default: {}
          properties:
            limits:
              $ref: '#/$defs/ResourceQuantity'
            requests:
              $ref: '#/$defs/ResourceQuantity'
          type: object
      properties:
        imagePullPolicy:
          default: IfNotPresent
          enum:
            - Always
            - IfNotPresent
            - Never
          type: string
        resources:
          $ref: '#/$defs/ResourceRequirements'
        schedule:
          default: 1 * * * *
          type: string
      type: object
  parameters:
    openAPIV3Schema:
      properties:
        activeDeadlineSeconds:
          default: 300
          type: integer
        backoffLimit:
          default: 3
          type: integer
        concurrencyPolicy:
          default: Forbid
          type: string
        failedJobsHistoryLimit:
          default: 1
          type: integer
        restartPolicy:
          default: OnFailure
          type: string
        successfulJobsHistoryLimit:
          default: 3
          type: integer
        timeZone:
          type: string
      type: object
  resources:
    - id: cronjob
      targetPlane: dataplane
      template:
        apiVersion: batch/v1
        kind: CronJob
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          concurrencyPolicy: ${parameters.concurrencyPolicy}
          failedJobsHistoryLimit: ${parameters.failedJobsHistoryLimit}
          jobTemplate:
            metadata:
              labels: ${metadata.labels}
            spec:
              activeDeadlineSeconds: ${parameters.activeDeadlineSeconds}
              backoffLimit: ${parameters.backoffLimit}
              template:
                metadata:
                  labels: ${metadata.podSelectors}
                spec:
                  containers:
                    - args: |
                        ${has(workload.container.args) ? workload.container.args : oc_omit()}
                      command: |
                        ${has(workload.container.command) ? workload.container.command : oc_omit()}
                      env: ${dependencies.toContainerEnvs()}
                      envFrom: ${configurations.toContainerEnvFrom()}
                      image: ${workload.container.image}
                      imagePullPolicy: ${environmentConfigs.imagePullPolicy}
                      name: main
                      resources:
                        limits:
                          cpu: ${environmentConfigs.resources.limits.cpu}
                          memory: ${environmentConfigs.resources.limits.memory}
                        requests:
                          cpu: ${environmentConfigs.resources.requests.cpu}
                          memory: ${environmentConfigs.resources.requests.memory}
                      volumeMounts: ${configurations.toContainerVolumeMounts() + dependencies.toContainerVolumeMounts()}
                  restartPolicy: ${parameters.restartPolicy}
                  volumes: ${configurations.toVolumes() + dependencies.toVolumes()}
          schedule: ${environmentConfigs.schedule}
          successfulJobsHistoryLimit: ${parameters.successfulJobsHistoryLimit}
          timeZone: |
            ${has(parameters.timeZone) ? parameters.timeZone : oc_omit()}
    - forEach: ${configurations.toConfigEnvsByContainer()}
      id: env-config
      targetPlane: dataplane
      template:
        apiVersion: v1
        data: |
          ${envConfig.envs.transformMapEntry(index, env, {env.name: env.value})}
        kind: ConfigMap
        metadata:
          name: ${envConfig.resourceName}
          namespace: ${metadata.namespace}
      var: envConfig
    - forEach: ${configurations.toConfigFileList()}
      id: file-config
      targetPlane: dataplane
      template:
        apiVersion: v1
        data:
          ${config.name}: |
            ${config.value}
        kind: ConfigMap
        metadata:
          name: ${config.resourceName}
          namespace: ${metadata.namespace}
      var: config
    - forEach: ${configurations.toSecretEnvsByContainer()}
      id: secret-env-external
      targetPlane: dataplane
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${secretEnv.resourceName}
          namespace: ${metadata.namespace}
        spec:
          data: |
            ${secretEnv.envs.map(secret, {
              "secretKey": secret.name,
              "remoteRef": {
                "key": secret.remoteRef.key,
                ?"property": secret.remoteRef.?property
              }
            })}
          refreshInterval: 15s
          secretStoreRef:
            kind: ClusterSecretStore
            name: ${dataplane.secretStore}
          target:
            creationPolicy: Owner
            name: ${secretEnv.resourceName}
      var: secretEnv
    - forEach: ${configurations.toSecretFileList()}
      id: secret-file-external
      targetPlane: dataplane
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${file.resourceName}
          namespace: ${metadata.namespace}
        spec:
          data:
            - remoteRef:
                key: ${file.remoteRef.key}
                property: |
                  ${has(file.remoteRef.property) ? file.remoteRef.property : oc_omit()}
              secretKey: ${file.name}
          refreshInterval: 15s
          secretStoreRef:
            kind: ClusterSecretStore
            name: ${dataplane.secretStore}
          target:
            creationPolicy: Owner
            name: ${file.resourceName}
      var: file
  workloadType: cronjob
