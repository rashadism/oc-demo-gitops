apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  annotations:
    openchoreo.dev/description: In-cluster Valkey cache (Redis-protocol-compatible) backed by a single-replica StatefulSet. In-memory only; data is lost on pod restart. For demonstration purposes only.
  name: valkey
spec:
  environmentConfigs:
    openAPIV3Schema:
      properties:
        adminEnabled:
          default: false
          type: boolean
        memory:
          default: 128Mi
          type: string
      type: object
  outputs:
    - name: host
      value: ${metadata.name}.${metadata.namespace}.svc.cluster.local
    - name: port
      value: "6379"
    - name: password
      secretKeyRef:
        key: password
        name: ${metadata.name}-creds
    - name: adminURL
      value: |-
        ${environmentConfigs.adminEnabled
          ? (has(gateway.ingress.external.https)
              ? "https://" + metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + gateway.ingress.external.https.host + ":" + string(gateway.ingress.external.https.port) + "/"
              : has(gateway.ingress.external.http)
                  ? "http://" + metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + gateway.ingress.external.http.host + ":" + string(gateway.ingress.external.http.port) + "/"
                  : "no-gateway-configured")
          : "disabled"}
  resources:
    - id: password-generator
      template:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-creds
          namespace: ${metadata.namespace}
        spec:
          allowRepeat: true
          digits: 8
          length: 32
          noUpper: false
          symbols: 0
    - id: creds
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-creds
          namespace: ${metadata.namespace}
        spec:
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: Password
                  name: ${metadata.name}-creds
          refreshInterval: "0"
          target:
            creationPolicy: Owner
            name: ${metadata.name}-creds
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          ports:
            - name: valkey
              port: 6379
              targetPort: 6379
          selector:
            app: ${metadata.name}
    - id: statefulset
      readyWhen: ${applied.statefulset.status.readyReplicas == applied.statefulset.status.replicas && applied.statefulset.status.replicas > 0}
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${metadata.name}
          serviceName: ${metadata.name}
          template:
            metadata:
              labels:
                app: ${metadata.name}
            spec:
              containers:
                - args:
                    - --requirepass
                    - $(VALKEY_PASSWORD)
                  env:
                    - name: VALKEY_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          key: password
                          name: ${metadata.name}-creds
                  image: valkey/valkey:8-alpine
                  name: valkey
                  ports:
                    - containerPort: 6379
                      name: valkey
                  resources:
                    limits:
                      memory: ${environmentConfigs.memory}
    - id: admin-deployment
      includeWhen: ${environmentConfigs.adminEnabled && has(gateway.ingress.external)}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${metadata.name}-admin
          template:
            metadata:
              labels:
                app: ${metadata.name}-admin
            spec:
              containers:
                - env:
                    - name: REDIS_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          key: password
                          name: ${metadata.name}-creds
                    - name: REDIS_HOSTS
                      value: ${metadata.resourceName}:${metadata.name}:6379:0:$(REDIS_PASSWORD)
                  image: rediscommander/redis-commander:latest
                  name: redis-commander
                  ports:
                    - containerPort: 8081
                      name: http
    - id: admin-service
      includeWhen: ${environmentConfigs.adminEnabled && has(gateway.ingress.external)}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
        spec:
          ports:
            - name: http
              port: 8081
              targetPort: 8081
          selector:
            app: ${metadata.name}-admin
    - id: admin-route
      includeWhen: ${environmentConfigs.adminEnabled && has(gateway.ingress.external)}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
        spec:
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + h)}
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          rules:
            - backendRefs:
                - name: ${metadata.name}-admin
                  port: 8081
  retainPolicy: Delete
