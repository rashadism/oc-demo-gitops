apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  annotations:
    openchoreo.dev/description: In-cluster PostgreSQL database backed by a single-replica StatefulSet. Ephemeral storage (emptyDir); for demonstration purposes only.
  name: postgres
spec:
  environmentConfigs:
    openAPIV3Schema:
      properties:
        adminEnabled:
          default: false
          type: boolean
        memory:
          default: 256Mi
          type: string
      type: object
  outputs:
    - name: host
      value: ${metadata.name}.${metadata.namespace}.svc.cluster.local
    - name: port
      value: "5432"
    - configMapKeyRef:
        key: database
        name: ${metadata.name}-config
      name: database
    - configMapKeyRef:
        key: username
        name: ${metadata.name}-config
      name: username
    - name: password
      secretKeyRef:
        key: password
        name: ${metadata.name}-creds
    - name: url
      secretKeyRef:
        key: url
        name: ${metadata.name}-creds
    - name: adminURL
      value: |-
        ${environmentConfigs.adminEnabled
          ? (has(gateway.ingress.external.https)
              ? "https://" + metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + gateway.ingress.external.https.host + ":" + string(gateway.ingress.external.https.port) + "/?pgsql=" + metadata.name + "&username=demo&db=" + parameters.database
              : has(gateway.ingress.external.http)
                  ? "http://" + metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + gateway.ingress.external.http.host + ":" + string(gateway.ingress.external.http.port) + "/?pgsql=" + metadata.name + "&username=demo&db=" + parameters.database
                  : "no-gateway-configured")
          : "disabled"}
    - name: adminPassword
      value: '${environmentConfigs.adminEnabled ? "demo" : "disabled"}'
  parameters:
    openAPIV3Schema:
      properties:
        database:
          default: appdb
          type: string
      type: object
  resources:
    - id: config
      template:
        apiVersion: v1
        data:
          database: ${parameters.database}
          username: ${metadata.resourceName}-user
        kind: ConfigMap
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-config
          namespace: ${metadata.namespace}
    - id: init-scripts
      template:
        apiVersion: v1
        data:
          01-create-app-user.sh: |
            #!/bin/bash
            set -e
            psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
              CREATE USER "$APPUSER" WITH PASSWORD '$APPUSER_PASSWORD';
              GRANT ALL ON DATABASE "$POSTGRES_DB" TO "$APPUSER";
              GRANT ALL ON SCHEMA public TO "$APPUSER";
            EOSQL
          02-create-demo-user.sh: |
            #!/bin/bash
            set -e
            psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
              CREATE USER demo WITH SUPERUSER PASSWORD 'demo';
            EOSQL
        kind: ConfigMap
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-init
          namespace: ${metadata.namespace}
    - id: password-gen-postgres
      template:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-creds-postgres
          namespace: ${metadata.namespace}
        spec:
          allowRepeat: true
          digits: 8
          length: 32
          noUpper: false
          symbols: 0
    - id: creds-postgres
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-creds-postgres
          namespace: ${metadata.namespace}
        spec:
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: Password
                  name: ${metadata.name}-creds-postgres
          refreshInterval: "0"
          target:
            creationPolicy: Owner
            name: ${metadata.name}-creds-postgres
    - id: password-gen-app
      template:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-creds
          namespace: ${metadata.namespace}
        spec:
          allowRepeat: true
          digits: 8
          length: 32
          noUpper: false
          symbols: 0
    - id: creds
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-creds
          namespace: ${metadata.namespace}
        spec:
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: Password
                  name: ${metadata.name}-creds
          refreshInterval: "0"
          target:
            creationPolicy: Owner
            name: ${metadata.name}-creds
            template:
              data:
                password: '{{ .password }}'
                url: postgres://${metadata.resourceName}-user:{{ .password }}@${metadata.name}.${metadata.namespace}.svc.cluster.local:5432/${parameters.database}?sslmode=disable
              type: Opaque
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          ports:
            - name: postgres
              port: 5432
              targetPort: 5432
          selector:
            app: ${metadata.name}
    - id: statefulset
      readyWhen: ${applied.statefulset.status.readyReplicas == applied.statefulset.status.replicas && applied.statefulset.status.replicas > 0}
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${metadata.name}
          serviceName: ${metadata.name}
          template:
            metadata:
              labels:
                app: ${metadata.name}
            spec:
              containers:
                - env:
                    - name: POSTGRES_USER
                      value: postgres
                    - name: POSTGRES_DB
                      valueFrom:
                        configMapKeyRef:
                          key: database
                          name: ${metadata.name}-config
                    - name: POSTGRES_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          key: password
                          name: ${metadata.name}-creds-postgres
                    - name: APPUSER
                      valueFrom:
                        configMapKeyRef:
                          key: username
                          name: ${metadata.name}-config
                    - name: APPUSER_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          key: password
                          name: ${metadata.name}-creds
                    - name: PGDATA
                      value: /var/lib/postgresql/data/pgdata
                  image: postgres:16-alpine
                  name: postgres
                  ports:
                    - containerPort: 5432
                      name: postgres
                  resources:
                    limits:
                      memory: ${environmentConfigs.memory}
                  volumeMounts:
                    - mountPath: /var/lib/postgresql/data
                      name: data
                    - mountPath: /docker-entrypoint-initdb.d
                      name: init-scripts
              volumes:
                - emptyDir: {}
                  name: data
                - configMap:
                    defaultMode: 493
                    name: ${metadata.name}-init
                  name: init-scripts
    - id: admin-deployment
      includeWhen: ${environmentConfigs.adminEnabled && has(gateway.ingress.external)}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${metadata.name}-admin
          template:
            metadata:
              labels:
                app: ${metadata.name}-admin
            spec:
              containers:
                - env:
                    - name: ADMINER_DEFAULT_SERVER
                      value: ${metadata.name}
                  image: adminer:4.8.1-standalone
                  name: adminer
                  ports:
                    - containerPort: 8080
                      name: http
    - id: admin-service
      includeWhen: ${environmentConfigs.adminEnabled && has(gateway.ingress.external)}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
        spec:
          ports:
            - name: http
              port: 8080
              targetPort: 8080
          selector:
            app: ${metadata.name}-admin
    - id: admin-route
      includeWhen: ${environmentConfigs.adminEnabled && has(gateway.ingress.external)}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          labels: ${metadata.labels}
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
        spec:
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + h)}
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          rules:
            - backendRefs:
                - name: ${metadata.name}-admin
                  port: 8080
  retainPolicy: Delete
